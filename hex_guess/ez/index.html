<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guess da color</title>
    <link rel="icon" href="/media/rain.gif" type="image/gif">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Numans&display=swap" rel="stylesheet">
</head>
<body>
    <div class="parent" style="flex-direction: column;">
        <div class="parent">
            <h1><span id = "title">GUESS THIS COLOR</span></h1>
        </div>

        <div class="parent" style="font-size: 20px; padding-top: 60px;
            padding-bottom: 40px; justify-content: center">
            <div class="parent" id = "solution_tag" style="width: 240px; justify-content: flex-end;">
                target color &nbsp; &nbsp;
                <svg height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                    <circle id = "solution_circle" r="25" cx="25" cy="25"/>
                </svg>
                &nbsp; &nbsp; &nbsp; &nbsp;
            </div>
            <div class="parent" id="guess_tag" style="width: 240px; justify-content: flex-start; display: none;">
                &nbsp; &nbsp; &nbsp; &nbsp;
                <svg height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                    <circle id = "guess_circle" r="25" cx="25" cy="25"/>
                </svg>
                &nbsp; &nbsp; your guess
            </div>
        </div>


        <div id = "result_1" class="parent" style="display: none;">
            <svg height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                <circle id = "guess_1_circle" r="25" cx="25" cy="25"/>
            </svg>
            <div id = "r_1_1" class="space"></div>
            <div id = "r_1_2" class="space"></div>
            <div id = "r_1_3" class="space"></div>
            <svg height = "50" width = "50"></svg>
        </div>

        <div id = "result_2" class="parent" style="display: none;">
            <svg height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                <circle id = "guess_2_circle" r="25" cx="25" cy="25"/>
            </svg>
            <div id = "r_2_1" class="space"></div>
            <div id = "r_2_2" class="space"></div>
            <div id = "r_2_3" class="space"></div>
            <svg height = "50" width = "50"></svg>
        </div>

        <div id = "result_3" class="parent" style="display: none;">
            <svg height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                <circle id = "guess_3_circle" r="25" cx="25" cy="25"/>
            </svg>
            <div id = "r_3_1" class="space"></div>
            <div id = "r_3_2" class="space"></div>
            <div id = "r_3_3" class="space"></div>
            <svg height = "50" width = "50"></svg>
        </div>

        <div id = "result_4" class="parent" style="display: none;">
            <svg height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                <circle id = "guess_4_circle" r="25" cx="25" cy="25"/>
            </svg>
            <div id = "r_4_1" class="space"></div>
            <div id = "r_4_2" class="space"></div>
            <div id = "r_4_3" class="space"></div>
            <svg height = "50" width = "50"></svg>
        </div>

        <div id = "result_5" class="parent" style="display: none;">
            <svg height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                <circle id = "guess_5_circle" r="25" cx="25" cy="25"/>
            </svg>
            <div id = "r_5_1" class="space"></div>
            <div id = "r_5_2" class="space"></div>
            <div id = "r_5_3" class="space"></div>
            <svg height = "50" width = "50"></svg>
        </div>

        <div id = "result_6" class="parent" style="display: none;">
            <svg height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                <circle id = "guess_6_circle" r="25" cx="25" cy="25"/>
            </svg>
            <div id = "r_6_1" class="space"></div>
            <div id = "r_6_2" class="space"></div>
            <div id = "r_6_3" class="space"></div>
            <svg height = "50" width = "50"></svg>
        </div>

        <div id = "guess_container" class="parent">
            <div id = "1" class="space" contenteditable="true"></div>
            <div id = "2" class="space" contenteditable="true"></div>
            <div id = "3" class="space" contenteditable="true"></div>
            <div id = "4"></div> <!-- I feel so hot and sexy for this workaround -->
        </div>

    </div>

    <div class="overlay"></div>

    <div class="scoreboard">
        <div class="close_button" onclick="
            document.getElementsByClassName('scoreboard')[0].style.display='none';
            document.getElementsByClassName('overlay')[0].style.display='none'">X
        </div>
        <span id="message"><h2>Statistics</h2></span>
        <span>
            <span id="gamesplayed">0</span> games played
            <span style="margin-left: 20px"id="winpercent">0</span>% win percentage
        </span>
        <div class="barchart_container">
            <div class="bar_parent">
                <span style="width:20px">1</span>
                <div class="bar" id="bar_1"></div>
            </div>
            <div class="bar_parent">
                <span style="width:20px">2</span>
                <div class="bar" id="bar_2"></div>
            </div>
            <div class="bar_parent">
                <span style="width:20px">3</span>
                <div class="bar" id="bar_3"></div>
            </div>
            <div class="bar_parent">
                <span style="width:20px">4</span>
                <div class="bar" id="bar_4"></div>
            </div>
            <div class="bar_parent">
                <span style="width:20px">5</span>
                <div class="bar" id="bar_5"></div>
            </div>
            <div class="bar_parent">
                <span style="width:20px">6</span>
                <div class="bar" id="bar_6"></div>
            </div>
        </div>
        <div class="parent">
            <div class="button" onclick="location.reload()">
                new game
            </div>
            <div class="button" onclick="
                document.getElementsByClassName('scoreboard')[0].style.display='none';
                document.getElementsByClassName('overlay')[0].style.display='none'">
                keep guessing
            </div>
        </div>
    </div>

    <!-- <a href="/" class="gif-button"></a> -->
    <script src="script.js"></script>
</body>
</html>
